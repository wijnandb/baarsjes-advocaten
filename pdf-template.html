<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<style>
    @page { margin: 32mm 24mm 28mm 24mm; size: A4; }
    body { font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; font-size: 11pt; line-height: 1.7; color: #2c3040; max-width: 100%; }
    h1 { font-size: 20pt; color: #1a2744; margin-bottom: 4px; line-height: 1.3; }
    h2 { font-size: 14pt; color: #1a2744; margin-top: 28px; margin-bottom: 8px; border-bottom: 2px solid #c59a4a; padding-bottom: 4px; }
    h3 { font-size: 12pt; color: #2a3f6a; margin-top: 20px; margin-bottom: 6px; }
    p { margin-bottom: 10px; }
    em { color: #5a6070; }
    strong { color: #1a2744; }
    hr { border: none; border-top: 1px solid #e2e5ec; margin: 24px 0; }
    ul, ol { margin-bottom: 12px; padding-left: 24px; }
    li { margin-bottom: 4px; }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; font-size: 10pt; }
    th { background: #1a2744; color: white; padding: 8px 12px; text-align: left; font-weight: 600; }
    td { padding: 8px 12px; border-bottom: 1px solid #e2e5ec; }
    tr:nth-child(even) td { background: #faf8f5; }
    .subtitle { font-size: 10pt; color: #5a6070; margin-bottom: 24px; }
    .header-line { height: 3px; background: linear-gradient(to right, #1a2744, #c59a4a); margin-bottom: 20px; }
    a { color: #3b6cb5; text-decoration: none; }
    code { background: #f4f5f7; padding: 2px 6px; border-radius: 3px; font-size: 10pt; }
    .page-break { page-break-before: always; }
</style>
</head>
<body>
<div class="header-line"></div>
%%CONTENT%%
</body>
</html>
